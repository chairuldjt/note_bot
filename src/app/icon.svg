<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Main Body -->
  <rect x="20" y="35" width="60" height="45" rx="15" fill="url(#botGrad)" />
  <!-- Eyes -->
  <rect x="32" y="50" width="12" height="12" rx="4" fill="white" filter="url(#glow)" />
  <rect x="56" y="50" width="12" height="12" rx="4" fill="white" filter="url(#glow)" />
  <!-- Antenna -->
  <path d="M50 35 L50 20" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" />
  <circle cx="50" cy="18" r="6" fill="#60a5fa" />
  <!-- Mouth / Detail -->
  <rect x="40" y="68" width="20" height="4" rx="2" fill="white" opacity="0.5" />
</svg>
